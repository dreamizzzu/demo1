spring:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

  application:
    name: demo1

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123456

  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

security:
  jwt:
    secret: demo-jwt-secret-key-for-spring-security-2026
    expiration-millis: 7200000